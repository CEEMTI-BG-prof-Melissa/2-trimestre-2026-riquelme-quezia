<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Formulário HTML</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Escolha de Estados</h1>
    <form action="index.html" method="post">
        <label for="nome">Nome:</label>
        <br>
        <input type="text" id="nome" name="nome">
        <br>
        <label for="textarea" id="comentarios" name="comentarios">Comentários:</label>
        <br>
        <textarea id="comentarios" name="comentarios"></textarea>
        <br>
        <label>Sudeste:</label>
        <br>
        <select>
            <option value="sao_paulo">São Paulo</option>
            <option value="rio_de_Janeiro">Rio De Janeiro</option>
            <option value="minas_gerais">Minas Gerais</option>
            <option value="espírito_santo">Espírito Santo</option>
        </select>
        <br>
        <label>Sul:</label>
        <br>
        <select>
            <option value="parana">Paraná</option>
            <option value="santa_catarina">Santa Catarina</option>
            <option value="rio_grande_do_sul">Rio Grande do Sul</option>
        </select>
        <br>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </form>
</body>
</html>

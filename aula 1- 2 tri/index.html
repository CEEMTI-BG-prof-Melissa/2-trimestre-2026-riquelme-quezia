<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Formulario html</title>
    <meta charset="UTF-8">
</head>

<body>
    <h1>Cadastro de Usuàrio</h1>
    <form action="cadastro.php" method="POST">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" nome="nome">
        <br>
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email">
        <br>
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha">
        <br>
        <label for="idade">Idade:</label>
        <input type="number" id="idade" name="idade">
        <br>
        <label for="data">Data de nacimento:</label>
        <input type="data" id="Name" name="Nascimento">
        <br>
        <p>Turno:</p>
        <input type="radio" name="turno" id="manha"> <label for="manha">Manhã</label>
        <input type="radio" name="turno" id="tarde"> <label for="noite">Tarde</label>
        <input type="radio" name="turno" id="noite"> <label for="noite">Noite</label>
        <br>
        <p>Áreas de interesse:</p>
        <input type="checkbox" name="area" id="programacao"> <label for="pogramacao">Programação</label>
        <input type="checkbox" name="area" id="design"> <label for="design">Design</label>
        <input type="checkbox" name="area" id="redes"> <label for="redes">Redes</label>
        <br>
        <input type="reset" value="Limpar">
        <input type="submit" value="Enviar">
   </form>
</body>
</html>
